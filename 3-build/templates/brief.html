<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    code, pre { font-family: 'JetBrains Mono', monospace; }

    /* Publication-style typography for the rendered brief body.
       Written as plain CSS so it does not depend on the Tailwind CDN
       processing @apply (which it does not do inside a <style> block). */
    .prose {
      color: #334155;
      line-height: 1.7;
      font-size: 1rem;
    }
    .prose h1 {
      font-size: 1.875rem;
      line-height: 1.25;
      font-weight: 700;
      color: #0f172a;
      margin-top: 0;
      margin-bottom: 0.5rem;
    }
    .prose h2 {
      font-size: 1.25rem;
      line-height: 1.4;
      font-weight: 600;
      color: #1e293b;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
    }
    .prose h3 {
      font-size: 1.125rem;
      line-height: 1.4;
      font-weight: 600;
      color: #334155;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .prose p {
      margin-top: 0.75rem;
      margin-bottom: 0.75rem;
      line-height: 1.7;
    }
    .prose ul,
    .prose ol {
      margin-top: 0.75rem;
      margin-bottom: 0.75rem;
      padding-left: 1.5rem;
    }
    .prose ul { list-style-type: disc; }
    .prose ol { list-style-type: decimal; }
    .prose li {
      margin-top: 0.375rem;
      margin-bottom: 0.375rem;
    }
    .prose a {
      color: #2563eb;
      text-decoration: underline;
    }
    .prose a:hover {
      color: #1e40af;
    }
    .prose strong {
      font-weight: 600;
      color: #0f172a;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-700">
  <div class="max-w-3xl mx-auto px-6 py-10">

    <header class="mb-10 border-b border-slate-200 pb-6">
      <a href="./index.html" class="text-sm text-slate-500 hover:text-slate-700">← Archive</a>
      <p class="mt-4 text-sm font-medium text-blue-600 uppercase tracking-wider">
        CQ Competitive Intelligence
      </p>
      <p class="mt-1 text-sm text-slate-500">Published {{ run_date }}</p>
    </header>

    <article class="prose">
      {{ body | safe }}
    </article>

    <footer class="mt-16 pt-6 border-t border-slate-200 text-sm text-slate-500">
      <p>Generated automatically by the CQ Competitive Intelligence Brief Engine.</p>
      <p class="mt-1">
        <a href="https://github.com/{{ github_handle }}/cq-competitive-intel" class="text-blue-600 hover:text-blue-800">View source</a>
      </p>
    </footer>

  </div>
</body>
</html>
